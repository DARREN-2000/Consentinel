apiVersion: v1
kind: Secret
metadata:
  name: {{ include "consentinel.fullname" . }}-secrets
  labels:
    {{- include "consentinel.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ .Values.backend.secrets.secretKey | b64enc | quote }}
  JWT_SECRET_KEY: {{ .Values.backend.secrets.jwtSecretKey | b64enc | quote }}
  # DATABASE_URL is constructed at runtime by the deployment using the PostgreSQL
  # password from the existingSecret referenced in postgresql.auth.existingSecret
