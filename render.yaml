services:
  - type: web
    name: consentinel-demo
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        # Demo-only ephemeral storage. Data resets when the service restarts.
        value: sqlite:////tmp/consentinel.db
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        # Demo convenience. Restrict this to your frontend domain for production.
        value: '["*"]'
